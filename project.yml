name: ChessRecall
options:
  bundleIdPrefix: com.chessrecall
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  chesskit-swift:
    url: https://github.com/chesskit-app/chesskit-swift
    from: "0.17.0"
  dd-sdk-ios:
    url: https://github.com/DataDog/dd-sdk-ios.git
    from: "3.1.0"

schemes:
  ChessRecall:
    build:
      targets:
        ChessRecall: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChessRecallTests
    archive:
      config: Release

targets:
  ChessRecall:
    type: application
    platform: iOS
    sources:
      - path: ChessRecall
    dependencies:
      - package: chesskit-swift
        product: ChessKit
      - package: dd-sdk-ios
        product: DatadogCore
      - package: dd-sdk-ios
        product: DatadogRUM
      - package: dd-sdk-ios
        product: DatadogLogs
      - package: dd-sdk-ios
        product: DatadogTrace
      - package: dd-sdk-ios
        product: DatadogCrashReporting
      - package: dd-sdk-ios
        product: DatadogSessionReplay
      - package: dd-sdk-ios
        product: DatadogProfiling
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chessrecall.app
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: ChessRecall/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        SUPPORTS_MACCATALYST: "NO"
        GENERATE_INFOPLIST_FILE: "NO"
        DEVELOPMENT_TEAM: 3KJ42RM854
        CODE_SIGN_STYLE: Automatic
    postBuildScripts:
      - name: Set Build Number from Git
        script: |
          BUILD=$(git -C "$SRCROOT" rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$TARGET_BUILD_DIR/$INFOPLIST_PATH"
        basedOnDependencyAnalysis: false

  ChessRecallTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChessRecallTests
    resources:
      - path: ChessRecallTests/Fixtures
        buildPhase: resources
    dependencies:
      - target: ChessRecall
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chessrecall.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ChessRecall.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ChessRecall"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        GENERATE_INFOPLIST_FILE: "YES"

  ChessRecallUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ChessRecallUITests
    dependencies:
      - target: ChessRecall
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chessrecall.uitests
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        GENERATE_INFOPLIST_FILE: "YES"
